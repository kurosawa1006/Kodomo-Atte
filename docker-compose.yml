services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: kodomo_atte
      MYSQL_USER: kodomo
      MYSQL_PASSWORD: kodomo
      MYSQL_ROOT_PASSWORD: kodomo_root_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-pkodomo_root_dev",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "sh",
        "-c",
        "python manage.py migrate --noinput && exec python manage.py runserver 0.0.0.0:8000",
      ]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql://kodomo:kodomo@db:3306/kodomo_atte
      SECRET_KEY: django-insecure-dev-only-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,web,[::1],0.0.0.0
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
