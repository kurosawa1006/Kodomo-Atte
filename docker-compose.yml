services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kodomo_atte
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kodomo_atte"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "sh",
        "-c",
        "python manage.py migrate --noinput && exec python manage.py runserver 0.0.0.0:8000",
      ]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/kodomo_atte
      SECRET_KEY: django-insecure-dev-only-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,web,[::1],0.0.0.0
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
