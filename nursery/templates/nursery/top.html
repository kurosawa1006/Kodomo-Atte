{% extends "nursery/base.html" %}

{% block title %}TOP | コドモアッテ{% endblock %}

{% block content %}
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="rounded-2xl border border-slate-100 bg-white/80 px-6 py-4 shadow-sm">
      <p class="text-xs font-medium tracking-wide text-sky-500">
        Kodomo-Atte ダッシュボード
      </p>
      <p class="mt-1 text-sm font-semibold text-slate-700">現在</p>
      <div class="mt-2 flex flex-wrap items-baseline gap-x-3 gap-y-1">
        <h1
          class="text-3xl font-bold tracking-tight text-slate-900"
          id="current-date"
        >
          —
        </h1>
        <span class="text-xl font-semibold text-sky-600" id="current-weekday"
          >—</span
        >
        <span
          class="text-2xl font-bold tracking-tight text-slate-800"
          id="current-time"
          >—</span
        >
      </div>
      <p class="mt-3 text-sm text-slate-500">
        登録されている園児の状況をひと目で確認できます。
      </p>
    </div>

    <!-- 天気（モック） -->
    <div
      class="flex items-center gap-4 rounded-2xl border border-slate-100 bg-white/90 px-6 py-4 shadow-sm"
    >
      <div
        class="flex h-12 w-12 items-center justify-center rounded-2xl border border-sky-100 bg-sky-50"
        aria-hidden="true"
      >
        <!-- Sun icon -->
        <svg
          class="h-7 w-7 text-sky-500"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M4.93 19.07l1.41-1.41"></path>
          <path d="M17.66 6.34l1.41-1.41"></path>
        </svg>
      </div>
      <div>
        <p class="text-xs font-medium text-sky-600">天気（モック）</p>
        <p class="text-lg font-semibold text-slate-900">
          今日の天気：晴れ 25℃
        </p>
      </div>
    </div>
  </div>

  <section class="rounded-2xl border border-slate-100 bg-white/95 shadow-sm">
    <div
      id="absent-list"
      hx-get="{% url 'absent_list_partial' %}"
      hx-trigger="every 5s"
      hx-swap="innerHTML"
    >
      {% include "nursery/partials/absent_list_partial.html" %}
    </div>
  </section>

  <script>
    (function () {
      const dateEl = document.getElementById("current-date");
      const weekdayEl = document.getElementById("current-weekday");
      const timeEl = document.getElementById("current-time");

      if (!dateEl || !weekdayEl || !timeEl) return;

      const fmtDate = new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
      const fmtWeekday = new Intl.DateTimeFormat("ja-JP", {
        weekday: "short",
      });
      const fmtTime = new Intl.DateTimeFormat("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });

      function update() {
        const d = new Date();
        dateEl.textContent = fmtDate.format(d);
        weekdayEl.textContent = fmtWeekday.format(d);
        timeEl.textContent = fmtTime.format(d);
      }

      update();
      setInterval(update, 1000);
    })();
  </script>
{% endblock %}
